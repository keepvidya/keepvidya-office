docs:
  - changed-files:
      - any-glob-to-any-file: ['docs/**', '**/*.md']
tests:
  - changed-files:
      - any-glob-to-any-file: ['tests/**']
ci:
  - changed-files:
      - any-glob-to-any-file: ['.github/**']
domain:
  - changed-files:
      - any-glob-to-any-file: ['src/domain/**']
adapters:
  - changed-files:
      - any-glob-to-any-file: ['src/adapters/**']
ui:
  - changed-files:
      - any-glob-to-any-file: ['src/ui/**', 'src/styles/**']
ai:
  - changed-files:
      - any-glob-to-any-file: ['src/ai/**']
